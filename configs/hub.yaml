# Template for Hugging Face Hub integration.
# The current shared scripts do not push or pull checkpoints from the Hub yet,
# but these fields provide a stable place for that configuration later.

hub:
  # Enable future Hub upload/download behavior.
  enabled: false

  # Target repository identifier, for example:
  # username/project-name
  repo_id: null

  # Hub visibility setting for future publishing logic.
  private: true

  # Branch or revision to use if future code supports pushing to a non-default ref.
  revision: main

  # Optional local directory name for cloned/downloaded hub artifacts.
  local_dir: null

  # Future upload controls.
  push_checkpoints: false
  push_best_only: true
  push_metrics: true

  # Placeholder for metadata that may later be written to the Hub card.
  tags:
    - gsm8k
    - qwen2.5
    - math-reasoning

  # Optional free-form notes for later publication scripts.
  notes: null
